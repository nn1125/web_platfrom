<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CBLAS / LAPACK Shell</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1a1b26;color:#c0caf5;font-family:'JetBrains Mono','Fira Code','Consolas',monospace}
#term{
  width:100%;height:100%;overflow-y:auto;padding:16px;font-size:14px;line-height:1.6;
}
#term .out{white-space:pre-wrap;word-wrap:break-word}
#term .err{color:#f7768e}
#term .ok{color:#9ece6a}
#term .dim{color:#565f89}
.input-row{display:flex;align-items:center;margin-top:2px}
.input-row .prompt{color:#7aa2f7;margin-right:6px;user-select:none;flex-shrink:0}
.input-row input{
  flex:1;background:transparent;border:none;outline:none;
  color:#c0caf5;font:inherit;caret-color:#bb9af7;
}
</style>
</head>
<body>
<div id="term"></div>

<script>
var Module = {
  print: function(text) {
    if (typeof addOutput === 'function') addOutput(text + '\n');
    else console.log(text);
  },
  printErr: function(text) {
    if (/Blocking on the main/.test(text)) return;
    if (/pre-main prep time/.test(text)) return;
    if (typeof addOutput === 'function') addOutput(text + '\n', 'err');
    else console.error(text);
  },
  onRuntimeInitialized: function() {
    addOutput('Module loaded.\n\n', 'ok');
    Module._main(0, 0);
    addOutput('\n');
    showPrompt();
  }
};
</script>

<script>
var term = document.getElementById('term');
var cmdHistory = [];
var histIdx = -1;
var currentInput = null;

function addOutput(text, cls) {
  var el = document.createElement('span');
  el.className = 'out' + (cls ? ' ' + cls : '');
  el.textContent = text;
  if (currentInput) {
    term.insertBefore(el, currentInput.closest('.input-row'));
  } else {
    term.appendChild(el);
  }
  term.scrollTop = term.scrollHeight;
}

function showPrompt() {
  var row = document.createElement('div');
  row.className = 'input-row';
  var pr = document.createElement('span');
  pr.className = 'prompt';
  pr.textContent = 'blas> ';
  var inp = document.createElement('input');
  inp.type = 'text';
  inp.autocomplete = 'off';
  inp.spellcheck = false;
  row.appendChild(pr);
  row.appendChild(inp);
  term.appendChild(row);
  currentInput = inp;
  inp.focus();
  term.scrollTop = term.scrollHeight;

  inp.addEventListener('keydown', function handleKey(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      var line = inp.value;
      inp.removeEventListener('keydown', handleKey);
      inp.readOnly = true;
      inp.style.caretColor = 'transparent';
      currentInput = null;
      addOutput('\n');
      if (line.trim()) {
        cmdHistory.push(line);
        runCommand(line.trim());
      }
      histIdx = -1;
      showPrompt();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (cmdHistory.length && histIdx < cmdHistory.length - 1) {
        histIdx++;
        inp.value = cmdHistory[cmdHistory.length - 1 - histIdx];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx > 0) { histIdx--; inp.value = cmdHistory[cmdHistory.length - 1 - histIdx]; }
      else { histIdx = -1; inp.value = ''; }
    }
  });
}

document.addEventListener('click', function() { if (currentInput) currentInput.focus(); });

function runCommand(line) {
  if (!Module._run_command) {
    addOutput('Module not loaded yet.\n', 'err');
    return;
  }
  var len = Module.lengthBytesUTF8(line) + 1;
  var ptr = Module._malloc(len);
  Module.stringToUTF8(line, ptr, len);
  Module._run_command(ptr);
  Module._free(ptr);
}

addOutput('Loading CBLAS/LAPACK WebAssembly module...\n', 'dim');
</script>

{{{ SCRIPT }}}
</body>
</html>
